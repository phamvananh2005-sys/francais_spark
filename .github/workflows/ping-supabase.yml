name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 0 * * *' # mỗi ngày
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase
        run: |
          curl -L \
          "https://fpcavcypxfynkepysdsq.supabase.co/rest/v1/topics?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}"